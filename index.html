<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DR MINE</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0a0a0a;
color:white;
}

.topo{
background:linear-gradient(180deg,#2b0000,#0a0a0a);
padding:25px;
position:sticky;
top:0;
border-bottom:1px solid #550000;
z-index:999;
}

.logo{
font-size:40px;
font-weight:900;
text-align:center;
}

.logo span{
color:#ff2020;
}

.sub{
text-align:center;
color:#bbb;
margin-top:10px;
}

.marquee{
margin-top:20px;
overflow:hidden;
background:#111;
padding:12px;
border-top:1px solid red;
border-bottom:1px solid red;
white-space:nowrap;
}

.track{
display:inline-block;
animation:move 15s linear infinite;
color:#ff4444;
font-weight:bold;
}

@keyframes move
.sub{
margin-top:10px;
color:#ccc;
}

.btn{
margin-top:20px;
display:inline-block;
background:red;
padding:14px 28px;
border-radius:12px;
text-decoration:none;
color:white;
font-weight:bold;
}

.marquee{
background:#111;
overflow:hidden;
padding:14px 0;
border-top:1px solid red;
border-bottom:1px solid red;
white-space:nowrap;
}

.track{
display:inline-block;
animation:slide 18s linear infinite;
font-weight:bold;
color:#ff4444;
font-size:18px;
}

@keyframes slide{
from{
transform:translateX(100%);
}

to{
transform:translateX(-100%);
}
}

.container{
padding:20px;
}

.titulo{
font-size:25px;
margin-bottom:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
}

.card{
background:#111;
border:1px solid #222;
border-radius:20px;
overflow:hidden;
transition:.3s;
}

.card:hover{
transform:scale(1.03);
border-color:red;
}

.thumb{
height:120px;
background:#1b1b1b;
display:flex;
justify-content:center;
align-items:center;
font-size:45px;
}

.info{
padding:15px;
}

.nome{
font-size:18px;
font-weight:bold;
}

.baixar{
margin-top:10px;
width:100%;
background:red;
color:white;
border:none;
padding:10px;
border-radius:10px;
font-weight:bold;
}

footer{
text-align:center;
padding:30px;
color:#666;
}

</style>
</head>

<body>

<header>

<div class="logo">
DR <span>MINE</span>
</div>

<p class="sub">
Baixe meus addons e arquivos oficiais Minecraft
</p>

<a class="btn" href="#">
MEU TIKTOK
</a>

</header>
